<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport"
          content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>%@</title>
    <style>
      .ghelp-hidden {
        display:none !important;
      }
      .ghelp-show {
        display:block !important;
      }
      .ghelp-content {
        margin: 0;
        padding: 0;
      }
      .ghelp-content ol,
      .ghelp-content ul {
        -webkit-padding-start: 0;
      }
      * {
        font-family:-apple-system, "Helvetica Neue", Helvetica, sans-serif !important;
      }
      html {
        font: -apple-system-body;
      }
    </style>
    %@ <!-- placeholder to inject light/dark CSS -->
    %@ <!-- placeholder to inject script element -->
  </head>
  <body class="ghelp-content">%@</body> <!-- placeholder to inject HTML body -->
</html>
